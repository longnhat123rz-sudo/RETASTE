# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Chạy tự động khi bạn push code lên nhánh main
  push:
    branches: ["main"]

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

# Thiết lập quyền hạn cho GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Đảm bảo chỉ có một tiến trình deploy chạy tại một thời điểm
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # FIX: Trỏ trực tiếp vào thư mục client chứa index.html của bạn
          path: './client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
